name: Deploy to GitHub Pages

# Publishes the static site to GitHub Pages on every push to main.
# In the repo: Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Assemble only the static site files — never the (git-ignored) private .bib,
      # the virtualenv, or IDE folders.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
